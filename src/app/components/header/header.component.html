<header class="header" [class.scrolled]="scrolled()" [class.menu-open]="menuOpen()">
  <div class="container header-inner">
    <a href="#home" class="logo" (click)="closeMenu()">
      <span class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
      </span>
      <span class="logo-text">Global Cargo Forwarders<span class="logo-accent"></span></span>
    </a>

    <nav class="nav-desktop">
      @for (link of navLinks; track link.fragment) {
        <a [href]="'#' + link.fragment" class="nav-link">{{ link.label }}</a>
      }
    </nav>

    <div class="header-actions">
      <app-theme-toggle />
      <a href="#quote" class="btn btn-primary btn-sm">Get Quote</a>
      <button class="menu-toggle" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()" aria-label="Toggle menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
  </div>

  <nav class="nav-mobile" [class.open]="menuOpen()">
    @for (link of navLinks; track link.fragment) {
      <a [href]="'#' + link.fragment" class="nav-link" (click)="closeMenu()">{{ link.label }}</a>
    }
    <a href="#quote" class="btn btn-primary" (click)="closeMenu()">Get Quote</a>
  </nav>
</header>
